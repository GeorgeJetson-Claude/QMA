<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painting Cost Calculator | QuoteMyAnything</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .btn-primary { background-color: #f59e0b; color: #fff; }
        .btn-primary:hover { background-color: #d97706; }
    </style>
</head>
<body class="bg-dark-bg text-dark-text min-h-screen">
    <nav class="bg-dark-surface border-b border-dark-border">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="font-bold text-lg text-emerald">QMA</a>
            <div class="text-sm text-dark-muted">Free Quotes On Anything!™</div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="text-4xl font-bold mb-4">Painting Cost Calculator</h1>
        <p class="text-dark-muted mb-6">Estimate painting costs for your project.</p>
        
        <div class="bg-dark-surface border border-dark-border rounded-lg p-8">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">Square feet to paint</label>
                <input type="number" name="sqft" min="100" max="10000" value="2000" class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded text-dark-text" onchange="calculatePaint()">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">Type of painting</label>
                <select name="type" class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded text-dark-text" onchange="calculatePaint()">
                    <option value="interior">Interior</option>
                    <option value="exterior">Exterior</option>
                    <option value="accent">Accent/feature walls</option>
                </select>
            </div>
            <button onclick="calculatePaint()" class="btn-primary px-6 py-3 rounded font-bold w-full">Calculate Cost</button>
            <div id="result" class="mt-6 p-4 bg-dark-bg rounded text-center"></div>
        </div>
    </main>
    <script>
        function calculatePaint() {
            const sqft = parseFloat(document.querySelector('input[name="sqft"]').value) || 2000;
            const type = document.querySelector('select[name="type"]').value;
            let costPer = 2.50;
            if (type === 'exterior') costPer = 3.50;
            const total = Math.round(sqft * costPer);
            document.getElementById('result').innerHTML = `<p class="text-2xl font-bold">~$${total}</p><p class="text-dark-muted mt-2">${sqft} sq ft × $${costPer}/sq ft</p><p class="mt-4"><a href="painting.html" class="btn-primary px-4 py-2 rounded inline-block">Get Free Painting Quotes →</a></p>`;
        }
    </script>
    
    <footer class="bg-dark-surface border-t border-dark-border mt-12 py-6">
        <div class="max-w-4xl mx-auto px-4 text-sm text-dark-muted text-center">
            <p class="mb-2">&copy; 2025 QuoteMyAnything, LLC. All rights reserved.</p>
        </div>
    </footer>
    <script src="assets/js/qma-chat.js"></script>
</body>
</html>

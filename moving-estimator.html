<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Cost Estimator | QuoteMyAnything</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .btn-primary { background-color: #f59e0b; color: #fff; }
        .btn-primary:hover { background-color: #d97706; }
    </style>
</head>
<body class="bg-dark-bg text-dark-text min-h-screen">
    <nav class="bg-dark-surface border-b border-dark-border">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="font-bold text-lg text-emerald">QMA</a>
            <div class="text-sm text-dark-muted">Free Quotes On Anything!™</div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-12">
        <h1 class="text-4xl font-bold mb-4">Moving Cost Estimator</h1>
        <p class="text-dark-muted mb-6">Get a rough estimate for your move.</p>
        
        <div class="bg-dark-surface border border-dark-border rounded-lg p-8">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">Move distance</label>
                <select name="distance" class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded text-dark-text" onchange="estimateMove()">
                    <option value="local">Local (under 10 miles)</option>
                    <option value="regional">Regional (10-100 miles)</option>
                    <option value="longdist">Long distance (100+ miles)</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">Home size</label>
                <select name="size" class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded text-dark-text" onchange="estimateMove()">
                    <option value="studio">Studio/1BR</option>
                    <option value="2br">2-3 BR</option>
                    <option value="4br">4+ BR</option>
                </select>
            </div>
            <button onclick="estimateMove()" class="btn-primary px-6 py-3 rounded font-bold w-full">Estimate Cost</button>
            <div id="result" class="mt-6 p-4 bg-dark-bg rounded text-center"></div>
        </div>
    </main>
    <script>
        function estimateMove() {
            const distance = document.querySelector('select[name="distance"]').value;
            const size = document.querySelector('select[name="size"]').value;
            let cost = 1500;
            if (distance === 'regional') cost = 3500;
            if (distance === 'longdist') cost = 6500;
            if (size === '2br') cost += 1000;
            if (size === '4br') cost += 2000;
            document.getElementById('result').innerHTML = `<p class="text-2xl font-bold">$${cost} - $${cost + 1500}</p><p class="text-dark-muted mt-2">Estimates vary. Get exact quotes below.</p><p class="mt-4"><a href="moving.html" class="btn-primary px-4 py-2 rounded inline-block">Get Free Moving Quotes →</a></p>`;
        }
    </script>
    
    <footer class="bg-dark-surface border-t border-dark-border mt-12 py-6">
        <div class="max-w-4xl mx-auto px-4 text-sm text-dark-muted text-center">
            <p class="mb-2">&copy; 2025 QuoteMyAnything, LLC. All rights reserved.</p>
        </div>
    </footer>
    <script src="assets/js/qma-chat.js"></script>
</body>
</html>
